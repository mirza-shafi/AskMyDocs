name: CI — Lint → Test → Eval Gate → Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/askmydocs-backend

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('backend/requirements.txt') }}

      - name: Install lint dependencies
        run: pip install ruff mypy pydantic pydantic-settings

      - name: Run ruff (linter + formatter check)
        run: ruff check app/ tests/

      - name: Run mypy (type checking)
        run: mypy app/ --ignore-missing-imports --no-strict-optional

  # ── Job 2: Unit Tests ───────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ hashFiles('backend/requirements.txt') }}

      - name: Install CPU-only torch
        run: |
          pip install torch==2.5.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (excluding eval gate)
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          GROQ_API_KEY: "gsk_test_placeholder"
        run: |
          pytest tests/test_ingest.py tests/test_query.py \
            -v --tb=short --asyncio-mode=auto

  # ── Job 3: Ragas Eval Gate ──────────────────────────────────────────────────
  eval-gate:
    name: Ragas Eval Gate
    runs-on: ubuntu-latest
    needs: unit-test
    # Only run on pushes to main (not on every PR to save API quota)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: eval-${{ hashFiles('backend/requirements.txt') }}

      - name: Install CPU-only torch
        run: |
          pip install torch==2.5.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ragas eval gate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENABLE_EVAL_TESTS: "1"
          RAGAS_FAITHFULNESS_THRESHOLD: "0.70"
          RAGAS_RELEVANCE_THRESHOLD: "0.70"
          RAGAS_CONTEXT_PRECISION_THRESHOLD: "0.65"
          RAGAS_CONTEXT_RECALL_THRESHOLD: "0.65"
        run: |
          pytest tests/test_eval.py \
            -v --tb=short --asyncio-mode=auto \
            --no-header -rN

  # ── Job 4: Docker Build & Push ──────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-test, eval-gate]
    # Only push on main branch after eval gate passes
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.unit-test.result == 'success' &&
      (needs.eval-gate.result == 'success' || needs.eval-gate.result == 'skipped')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
            RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
