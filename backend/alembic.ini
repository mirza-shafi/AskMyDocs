# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Add the backend/ directory to sys.path so 'app' module is importable
# This fixes ModuleNotFoundError: No module named 'app' when running alembic
prepend_sys_path = .

# Template for auto-generated migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for generated timestamps
timezone = UTC

# Max length of the slug in auto-generated file names
truncate_slug_length = 40

# URL is overridden in alembic/env.py via get_settings().DATABASE_URL
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Uncomment to auto-format migration files with ruff (adjust path to your venv)
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
