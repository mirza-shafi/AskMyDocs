services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: askmydocs-backend:latest
    container_name: askmydocs-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
